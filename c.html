<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Flip Card</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#fff;
  color:#111;
}

/* ================= HERO ================= */

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:60px;
  padding:120px 10%;
  flex-wrap:wrap;
}

/* LEFT CONTENT */
.hero-content{
  flex:1;
}

.hero-content h1{
  font-size:4rem;
  margin-bottom:20px;
}

.hero-content span{
  color:#ff7a00;
}

.hero-content p{
  line-height:2;
  margin-bottom:30px;
}

/* BUTTONS */
.hero-btns{
  display:flex;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.btn{
  padding:14px 28px;
  border-radius:50px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.primary-btn{
  background:#ff7a00;
  color:#fff;
}

.secondary-btn{
  border:2px solid #ff7a00;
  background:transparent;
  color:#111;
}

/* STATS */
.hero-stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.stat-box{
  background:#fff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* ================= FLIP CARD ================= */

.hero-image{
  flex:1;
  display:flex;
  justify-content:center;
  perspective:1200px;
}

.flip-card{
  width:100%;
  max-width:520px;
  height:420px;
}

.flip-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}

/* FLIP EFFECT */
.hero-image:hover .flip-inner{
  transform:rotateY(180deg);
}

/* FRONT + BACK */
.flip-front,
.flip-back{
  position:absolute;
  inset:0;
  border-radius:30px;
  overflow:hidden;
  backface-visibility:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* IMAGE */
.flip-front img,
.flip-back img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BACK SIDE */
.flip-back{
  transform:rotateY(180deg);
}

/* ================= RESPONSIVE ================= */

@media(max-width:900px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero-content h1{
    font-size:2.5rem;
  }

  .hero-stats{
    justify-content:center;
  }

  .flip-card{
    height:320px;
  }
}

</style>
</head>

<body>

<!-- ================= HERO SECTION ================= -->

<section class="hero">

  <!-- LEFT TEXT (UNCHANGED CONTENT) -->
  <div class="hero-content">

    <h1>
      Fresh Bakery <span>Luxury Pricing</span>
    </h1>

    <p>
      Discover handcrafted cakes, pastries and dessert
      collections designed for birthdays, weddings and
      premium celebrations.
    </p>

    <div class="hero-btns">
      <button class="btn primary-btn">Explore Pricing</button>
      <button class="btn secondary-btn">View Desserts</button>
    </div>

    <div class="hero-stats">

      <div class="stat-box">
        <h3>15K+</h3>
        <p>Happy Customers</p>
      </div>

      <div class="stat-box">
        <h3>120+</h3>
        <p>Luxury Cakes</p>
      </div>

    </div>

  </div>

  <!-- RIGHT FLIP IMAGE -->
  <div class="hero-image">

    <div class="flip-card">
      <div class="flip-inner">

        <!-- FRONT IMAGE -->
        <div class="flip-front">
          <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=1200&auto=format&fit=crop">
        </div>

        <!-- BACK IMAGE -->
        <div class="flip-back">
          <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=1200&auto=format&fit=crop">
        </div>

      </div>
    </div>

  </div>

</section>

</body>
</html>
