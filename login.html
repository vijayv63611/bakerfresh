<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Crumbs - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffffff;
  transition:0.4s;
}

/* DARK MODE */
body.dark{
  background:#0f0f0f;
  color:#fff;
}

/* FLOAT BG */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  z-index:-1;
}

.bg span{
  position:absolute;
  width:18px;
  height:18px;
  background:rgba(255,122,0,0.15);
  border-radius:50%;
  animation:float 10s linear infinite;
  bottom:-120px;
}

@keyframes float{
  0%{transform:translateY(0) scale(0);}
  100%{transform:translateY(-1000px) scale(1);}
}

.card{
  width:380px;
  background:#fff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  text-align:center;
}

body.dark .card{
  background:#1a1a1a;
  color:#fff;
}

.logo{
  font-size:24px;
  font-weight:700;
  color:#ff7a00;
  text-decoration:none;
}

.input-box{
  margin-top:15px;
}

.input-box input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

body.dark .input-box input{
  background:#222;
  color:#fff;
  border:1px solid #444;
}

.password-box{
  position:relative;
}

.eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

/* OPTIONS ROW */
.options{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-top:10px;
}

.options a{
  text-decoration:none;
  color:#ff7a00;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#ff7a00;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.social{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.social button{
  width:45px;
  height:45px;
  border:1px solid #ddd;
  border-radius:10px;
  background:#fff;
}

.top-icons{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
}

.icon-btn{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#ff7a00;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg">
  <span></span><span></span><span></span><span></span>
</div>

<!-- TOP ICONS -->
<div class="top-icons">
  <button class="icon-btn" onclick="toggleTheme()"><i class="bi bi-moon"></i></button>
  <button class="icon-btn" onclick="toggleDir()"><i class="bi bi-arrow-left-right"></i></button>
</div>

<!-- CARD -->
<div class="card">

  <a href="index.html" class="logo">Sweet Crumbs</a>
  <h3>Login</h3>

  <div class="input-box">
    <input type="email" placeholder="Email address">
  </div>

  <div class="input-box password-box">
    <input type="password" id="pass" placeholder="Password">
    <i class="bi bi-eye eye" onclick="togglePass()"></i>
  </div>

  <!-- FORGOT PASSWORD + REMEMBER -->
  <div class="options">
    <label><input type="checkbox"> Remember Me</label>
    <a href="forgot.html">Forgot Password?</a>
  </div>

  <button class="btn">Login</button>

  <div class="social">
    <button><i class="bi bi-google"></i></button>
    <button><i class="bi bi-apple"></i></button>
    <button><i class="bi bi-facebook"></i></button>
  </div>

  <p style="margin-top:10px;font-size:13px;">
    New user? <a href="signup.html" style="color:#ff7a00;text-decoration:none;">Sign Up</a>
  </p>

</div>

<script>
function togglePass(){
  let p=document.getElementById("pass");
  p.type = p.type==="password"?"text":"password";
}

function toggleTheme(){
  document.body.classList.toggle("dark");
}

function toggleDir(){
  document.body.dir = document.body.dir==="rtl"?"ltr":"rtl";
}
</script>

</body>
</html>
