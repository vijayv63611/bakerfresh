<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Crumbs - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f4f4;
}
/* DARK MODE */
body.dark{
  background:#0f0f0f;
}

.card.dark{
  background:#1a1a1a;
  color:#fff;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* INPUTS */
.card.dark input{
  background:#111;
  border:1px solid #333;
  color:#fff;
}

.card.dark input::placeholder{
  color:#aaa;
}

/* PASSWORD EYE ICON */
.card.dark .eye{
  color:#fff;
}

/* LINKS */
.card.dark a{
  color:#ff7a00;
}

/* OPTIONS TEXT */
.card.dark .options{
  color:#fff;
}

/* SOCIAL BUTTONS */
.card.dark .social button{
  background:#111;
  border:1px solid #333;
  color:#fff;
}

/* SOCIAL ICON HOVER */
.card.dark .social button:hover{
  background:#ff7a00;
  color:#fff;
  border-color:#ff7a00;
}

/* COMPANY TEXT */
.card.dark .company{
  color:#bbb;
}

/* CARD */
.card{
  width:380px;
  padding:30px;
  border-radius:18px;
  background:#fff;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  position:relative;
  direction:ltr;
}

/* DARK */
.card.dark{
  background:#1a1a1a;
  color:#fff;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}


/* RTL */
.card.rtl{
  direction:rtl;
  text-align:right;
}

/* TOP TOGGLES */
.top-icons{
  position:absolute;
  top:15px;
  right:15px;
  display:flex;
  flex-direction:row;   /* ✅ same row */
  gap:10px;
}

/* RTL support (move to left side if needed) */
.card.rtl .top-icons{
  right:auto;
  left:15px;
}
.icon-btn{
  width:36px;height:36px;
  border:none;border-radius:50%;
  background:#ff7a00;color:#fff;
  cursor:pointer;
}

/* LOGO */
.logo{
  font-size:22px;
  font-weight:700;
  color:#ff7a00;
  display:block;
  margin-bottom:15px;
  text-decoration:none;
}

/* INPUTS */
.input-box{margin-bottom:12px;}
.input-box input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
}

/* PASSWORD */
.password-box{position:relative;}
.eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}
.card.rtl .eye{
  right:auto;
  left:10px;
}

/* OPTIONS */
.options{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin:10px 0;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  background:#ff7a00;
  border:none;
  color:#fff;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

/* SOCIAL */
.social{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.social button{
  width:40px;height:40px;
  border:1px solid #ddd;
  border-radius:10px;
  background:transparent;
}

/* FOOTER */
.company{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="card" id="card">

  <!-- TOP RIGHT TOGGLES -->
  <div class="top-icons">
    <button class="icon-btn" onclick="toggleTheme()"><i class="bi bi-moon"></i></button>
    <button class="icon-btn" onclick="toggleDir()"><i class="bi bi-arrow-left-right"></i></button>
  </div>

  <!-- LOGO -->
  <a href="index.html" class="logo">Sweet Crumbs</a>


  <div class="input-box">
    <input type="email" placeholder="Email">
  </div>

  <div class="input-box password-box">
    <input type="password" id="pass" placeholder="Password">
    <i class="bi bi-eye eye" onclick="togglePass()"></i>
  </div>

  <!-- OPTIONS -->
  <div class="options">
    <label><input type="checkbox"> Remember Me</label>
    <a href="#">Forgot Password?</a>
  </div>

  <button class="btn">Login</button>
  <p style="margin-top:12px; font-size:13px; text-align:center;">
  New user?
  <a href="signup.html"
     style="color:#ff7a00; text-decoration:none; font-weight:600;">
    Sign Up
  </a>
</p>

  <!-- SOCIAL LOGIN -->
  <div class="social">
    <button><i class="bi bi-google"></i></button>
    <button><i class="bi bi-apple"></i></button>
    <button><i class="bi bi-facebook"></i></button>
  </div>

  <div class="company">© 2026 Sweet Crumbs</div>

</div>

<script>
const card = document.getElementById("card");

function togglePass(){
  let p = document.getElementById("pass");
  p.type = p.type === "password" ? "text" : "password";
}

function toggleTheme(){

  card.classList.toggle("dark");

  /* BODY DARK */
  document.body.classList.toggle("dark");

}

function toggleDir(){
  card.classList.toggle("rtl");
}
</script>

</body>
</html>
