<!DOCTYPE html>
<html>
<head>

<title>Login Page</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

#darkModeToggle,
#rtlToggle{
    display:none;
}

.main-light{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
    color:#fff;
}

#darkModeToggle:checked ~ .main-light{
    background:#f5f5f5;
    color:#000;
}

#rtlToggle:checked ~ .main-light{
    direction:rtl;
    text-align:right;
}

.back-btn{
    position:absolute;
    top:20px;
    left:25px;
    text-decoration:none;
    color:#ffc107;
    font-weight:bold;
}

.top-controls{
    position:absolute;
    top:20px;
    right:25px;
    font-size:20px;
}

.top-controls label{
    margin-left:15px;
    cursor:pointer;
}

/* ❌ FIXED: removed duplicate icon CSS */
.top-controls label i{
    font-size:22px;
    color:#ff9800;
    margin-left:10px;
    cursor:pointer;
    transition:0.3s;
}

.top-controls label i:hover{
    transform:scale(1.2);
    color:#ffffff;
}

/* DARK MODE ICON COLOR */
#darkModeToggle:checked ~ .main-light .top-controls label i{
    color:#ff9800;
}

.login-box{
    width:350px;
    background:#1b1b1b;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* dark mode card */
#darkModeToggle:checked ~ .main-light .login-box{
    background:#fff;
    color:#000;
}

.title{
    text-align:center;
    font-size:24px;
    margin-bottom:20px;
}

.field{
    margin-bottom:15px;
}

.field input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#2b2b2b;
    color:#fff;
}

#darkModeToggle:checked ~ .main-light input{
    background:#eee;
    color:#000;
}

.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:15px;
}

.options a{
    color:#ffc107;
    text-decoration:none;
}

/* button */
.login-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#ffc107;
    font-weight:bold;
    cursor:pointer;
}

.social-login{
    margin-top:20px;
}

.social-login button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.google{
    background:#fff;
    color:#000;
}

.apple{
    background:#000;
    color:#fff;
}

.facebook{
    background:#1877f2;
    color:#fff;
}

/* 🍊 BRAND LOGO */
.brand{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#ff9800;
    cursor:pointer;
    margin-bottom:20px;
    transition:0.3s;
    user-select:none;
}

.brand:hover{
    transform:scale(1.08);
    text-shadow:0 0 15px rgba(255,152,0,0.6);
}

</style>
</head>

<body>

<input type="checkbox" id="darkModeToggle">
<input type="checkbox" id="rtlToggle">

<div class="main-light">

<div class="top-controls">

  <!-- 🌙 DARK MODE -->
  <label for="darkModeToggle">
    <i class="bi bi-moon-stars"></i>
  </label>

  <!-- 🔁 RTL -->
  <label for="rtlToggle">
    <i class="bi bi-arrow-left-right"></i>
  </label>

</div>

<div class="login-box">

<div class="brand" onclick="goHome()">
   Sweet Crumbs
</div>

<form>

<div class="field">
<input type="email" placeholder="Enter Email">
</div>

<div class="field">
<input type="password" placeholder="Enter Password">
</div>

<div class="options">
<label><input type="checkbox"> Remember</label>
<a href="#">Forgot?</a>
</div>

<button type="button" class="login-btn" onclick="login()">Login</button>

<p style="text-align:center;margin-top:15px;">
New user? 
<a href="signup.html" style="color:#ffc107;">Register</a>
</p>

</form>

<div class="social-login">

<button class="google">
<i class="bi bi-google"></i> Google
</button>

<button class="apple">
<i class="bi bi-apple"></i> Apple
</button>

<button class="facebook">
<i class="bi bi-facebook"></i> Facebook
</button>

</div>

</div>

</div>

<script>

function login(){

    let email = document.querySelector("input[type='email']").value;
    let password = document.querySelector("input[type='password']").value;

    let validEmail = "admin@gmail.com";
    let validPassword = "1234";

    if(email === "" || password === ""){
        alert("Please fill all fields");
        return;
    }

    if(email === validEmail && password === validPassword){
        alert("Login Success");
        window.location.href = "dashboard.html";
    }
    else{
        alert("Invalid Email or Password");
    }
}

function goHome(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
