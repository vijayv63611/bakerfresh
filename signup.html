<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Crumbs - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f4f4;
}

/* ================= CARD ================= */
.card{
  width:380px;
  padding:30px;
  border-radius:18px;
  background:#fff;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  position:relative;
  direction:ltr;

  /* ✅ PREMIUM ANIMATION START STATE */
  opacity:0;
  transform:translateY(80px) scale(0.85);
  filter:blur(8px);

  /* animation */
  animation:cardPop 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* ================= PREMIUM KEYFRAME ================= */
@keyframes cardPop{
  0%{
    opacity:0;
    transform:translateY(80px) scale(0.85);
    filter:blur(10px);
  }

  60%{
    opacity:1;
    transform:translateY(-10px) scale(1.03);
    filter:blur(0);
  }

  80%{
    transform:translateY(5px) scale(0.98);
  }

  100%{
    opacity:1;
    transform:translateY(0) scale(1);
    filter:blur(0);
  }
}

/* DARK */
.card.dark{
  background:#1a1a1a;
  color:#fff;
}

/* RTL */
.card.rtl{
  direction:rtl;
  text-align:right;
}

/* TOP CONTROLS */
.top-icons{
  position:absolute;
  top:15px;
  right:15px;
  display:flex;
  flex-direction:row;
  gap:10px;
}

.card.rtl .top-icons{
  right:auto;
  left:15px;
}

.icon-btn{
  width:36px;
  height:36px;
  border:none;
  border-radius:50%;
  background:#ff7a00;
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}

.icon-btn:hover{
  transform:rotate(12deg) scale(1.1);
}

/* LOGO */
.logo{
  font-size:22px;
  font-weight:700;
  color:#ff7a00;
  display:block;
  margin-bottom:15px;
  text-decoration:none;
}

/* INPUTS */
.input-box{
  margin-bottom:12px;
}

.input-box input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
  background:transparent;
  color:inherit;
}

/* PASSWORD */
.password-box{
  position:relative;
}

.eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

.card.rtl .eye{
  right:auto;
  left:10px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  background:#ff7a00;
  border:none;
  color:#fff;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.03);
}

/* SOCIAL */
.social{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.social button{
  width:40px;
  height:40px;
  border:1px solid #ddd;
  border-radius:10px;
  background:transparent;
  transition:0.3s;
}

.social button:hover{
  transform:translateY(-5px) scale(1.1);
  border-color:#ff7a00;
}

/* LOGIN LINK */
.link{
  text-align:center;
  margin-top:12px;
  font-size:13px;
}

.link a{
  color:#ff7a00;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="card" id="card">

  <!-- TOP CONTROLS -->
  <div class="top-icons">
    <button class="icon-btn" onclick="toggleTheme()">
      <i class="bi bi-moon"></i>
    </button>

    <button class="icon-btn" onclick="toggleDir()">
      <i class="bi bi-arrow-left-right"></i>
    </button>
  </div>

  <!-- LOGO -->
  <a class="logo">Sweet Crumbs</a>
  <h3>Create Account</h3>

  <!-- INPUTS -->
  <div class="input-box">
    <input type="text" placeholder="Full Name">
  </div>

  <div class="input-box">
    <input type="email" placeholder="Email">
  </div>

  <div class="input-box password-box">
    <input type="password" placeholder="Password">
    <i class="bi bi-eye eye"></i>
  </div>

  <div class="input-box password-box">
    <input type="password" placeholder="Confirm Password">
  </div>

  <!-- BUTTON -->
  <button class="btn">Sign Up</button>

  <!-- SOCIAL -->
  <div class="social">
    <button><i class="bi bi-google"></i></button>
    <button><i class="bi bi-apple"></i></button>
    <button><i class="bi bi-facebook"></i></button>
  </div>

  <!-- LOGIN LINK -->
  <div class="link">
    Already have an account?
    <a href="login.html">Login</a>
  </div>

</div>

<script>
const card=document.getElementById("card");

function toggleTheme(){
  card.classList.toggle("dark");
}

function toggleDir(){
  card.classList.toggle("rtl");
}
</script>

</body>
</html>
