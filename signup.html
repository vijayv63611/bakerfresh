<!DOCTYPE html>
<html>
<head>

<title>Sweet Crumbs Login</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

#darkModeToggle,
#rtlToggle{
    display:none;
}

.main-light{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
    color:#fff;
}

/* DARK MODE */
#darkModeToggle:checked ~ .main-light{
    background:#f5f5f5;
    color:#000;
}

/* RTL */
#rtlToggle:checked ~ .main-light{
    direction:rtl;
    text-align:right;
}

/* TOP */
.top-controls{
    position:absolute;
    top:20px;
    right:25px;
    font-size:20px;
}

.top-controls label{
    margin-left:15px;
    cursor:pointer;
}

.top-controls i{
    font-size:22px;
    color:#ff9800;
    transition:0.3s;
}

.top-controls i:hover{
    transform:scale(1.2);
}

/* BOX */
.login-box{
    width:350px;
    background:#1b1b1b;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    position:relative;
}

/* DARK MODE */
#darkModeToggle:checked ~ .main-light .login-box{
    background:#fff;
    color:#000;
}

/* BRAND */
.brand{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#ff9800;
    cursor:pointer;
    margin-bottom:20px;
    transition:0.3s;
}

.brand:hover{
    transform:scale(1.08);
}

/* TITLE */
.title{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
}

/* INPUT */
.field{
    margin-bottom:15px;
}

.field input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#2b2b2b;
    color:#fff;
}

#darkModeToggle:checked ~ .main-light input{
    background:#eee;
    color:#000;
}

/* BUTTON */
.login-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#ffc107;
    font-weight:bold;
    cursor:pointer;
}

/* SWITCH LINK */
.switch{
    text-align:center;
    margin-top:15px;
}

.switch a{
    color:#ffc107;
    cursor:pointer;
    text-decoration:none;
}

/* HIDE FORMS */
.form{
    display:none;
}

/* ACTIVE FORM */
.active{
    display:block;
}

/* OPTIONS */
.options{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:15px;
}

.options a{
    color:#ffc107;
    text-decoration:none;
}

</style>
</head>

<body>

<input type="checkbox" id="darkModeToggle">
<input type="checkbox" id="rtlToggle">

<div class="main-light">

<div class="top-controls">

  <label for="darkModeToggle"><i class="bi bi-moon-stars"></i></label>
  <label for="rtlToggle"><i class="bi bi-arrow-left-right"></i></label>

</div>

<div class="login-box">

<div class="brand" onclick="goHome()">Sweet Crumbs</div>

<!-- LOGIN FORM -->
<div id="loginForm" class="form active">

<div class="title">Login</div>

<div class="field">
<input type="email" placeholder="Enter Email">
</div>

<div class="field">
<input type="password" placeholder="Enter Password">
</div>

<div class="options">
<label><input type="checkbox"> Remember</label>
<a href="#">Forgot?</a>
</div>

<button class="login-btn" onclick="login()">Login</button>

<div class="switch">
New user? <a onclick="toggle()">Signup</a>
</div>

</div>

<!-- SIGNUP FORM -->
<div id="signupForm" class="form">

<div class="title">Signup</div>

<div class="field">
<input type="text" placeholder="Full Name">
</div>

<div class="field">
<input type="email" placeholder="Email">
</div>

<div class="field">
<input type="password" placeholder="Password">
</div>

<button class="login-btn">Create Account</button>

<div class="switch">
Already have account? <a onclick="toggle()">Login</a>
</div>

</div>

</div>

</div>

<script>

function toggle(){
    document.getElementById("loginForm").classList.toggle("active");
    document.getElementById("signupForm").classList.toggle("active");
}

function login(){

    let email = document.querySelector("#loginForm input[type='email']").value;
    let password = document.querySelector("#loginForm input[type='password']").value;

    if(email === "" || password === ""){
        alert("Please fill all fields");
        return;
    }

    if(email === "admin@gmail.com" && password === "1234"){
        alert("Login Success");
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid Email or Password");
    }
}

function goHome(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
