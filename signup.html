<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Crumbs - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
  transition:0.4s ease;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;

  /* ⭐ WHITE BACKGROUND */
  background:#ffffff;
  color:#111;
}

/* ================= SOFT BACKGROUND ANIMATION ================= */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  z-index:-1;
  background:#ffffff;
  overflow:hidden;
}

.bg span{
  position:absolute;
  width:18px;
  height:18px;
  background:rgba(255,122,0,0.08);
  border-radius:50%;
  animation:float 12s linear infinite;
  bottom:-150px;
}

@keyframes float{
  0%{transform:translateY(0) scale(0);}
  100%{transform:translateY(-1100px) scale(1);}
}

.bg span:nth-child(1){left:10%;}
.bg span:nth-child(2){left:20%;animation-delay:2s;}
.bg span:nth-child(3){left:30%;animation-delay:4s;}
.bg span:nth-child(4){left:40%;animation-delay:6s;}
.bg span:nth-child(5){left:50%;animation-delay:1s;}
.bg span:nth-child(6){left:60%;animation-delay:3s;}
.bg span:nth-child(7){left:70%;animation-delay:5s;}
.bg span:nth-child(8){left:80%;animation-delay:2s;}

/* ================= TOP ICONS ================= */
.top-icons{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:12px;
}

.icon-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:#fff;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  cursor:pointer;
  font-size:18px;
}

/* ================= CARD ================= */
.card{
  width:420px;
  background:#fff;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
  z-index:2;
}

/* LOGO */
.logo{
  font-size:26px;
  font-weight:700;
  color:#ff7a00;
  text-decoration:none;
  display:inline-block;
}

h3{
  margin:10px 0;
}

/* ================= INPUT ================= */
.input-box{
  margin-top:12px;
}

.input-box input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
  background:#fff;
}

/* PASSWORD */
.password-box{
  position:relative;
}

.eye{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

/* ================= BUTTON ================= */
.btn{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#ff7a00;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

/* ================= SOCIAL ================= */
.social{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.social button{
  width:45px;
  height:45px;
  border:1px solid #eee;
  border-radius:10px;
  background:#fff;
  cursor:pointer;
  font-size:18px;
}

/* LINK */
.link{
  margin-top:10px;
  font-size:13px;
}

.link a{
  color:#ff7a00;
  text-decoration:none;
}

/* ================= DARK MODE ================= */
body.dark{
  background:#0b0b0b;
  color:#fff;
}

body.dark .bg{
  background:#0b0b0b;
}

body.dark .card{
  background:#1a1a1a;
  color:#fff;
}

body.dark input{
  background:#111;
  color:#fff;
  border:1px solid #333;
}

body.dark .social button{
  background:#111;
  border:1px solid #333;
  color:#fff;
}

/* ================= RTL ================= */
body.rtl{
  direction:rtl;
}

body.rtl .card{
  text-align:right;
}

body.rtl .eye{
  right:auto;
  left:12px;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span>
</div>

<!-- TOP ICONS -->
<div class="top-icons">
  <button class="icon-btn" onclick="toggleTheme()">
    <i class="bi bi-moon-stars"></i>
  </button>

  <button class="icon-btn" onclick="toggleRTL()">
    ⇄
  </button>
</div>

<!-- CARD -->
<div class="card">

  <a href="index.html" class="logo">Sweet Crumbs</a>

  <h3>Create Account</h3>

  <div class="input-box">
    <input type="text" placeholder="Full Name">
  </div>

  <div class="input-box">
    <input type="email" placeholder="Email Address">
  </div>

  <div class="input-box password-box">
    <input type="password" id="pass" placeholder="Password">
    <i class="bi bi-eye eye" onclick="togglePass()"></i>
  </div>

  <div class="input-box">
    <input type="password" placeholder="Confirm Password">
  </div>

  <button class="btn">Sign Up</button>

  <div class="social">
    <button><i class="bi bi-google"></i></button>
    <button><i class="bi bi-apple"></i></button>
    <button><i class="bi bi-facebook"></i></button>
  </div>

  <div class="link">
    Already have an account? <a href="login.html">Login</a>
  </div>

</div>

<script>

function toggleTheme(){
  document.body.classList.toggle("dark");
}

function toggleRTL(){
  document.body.classList.toggle("rtl");
}

function togglePass(){
  let p = document.getElementById("pass");
  p.type = (p.type === "password") ? "text" : "password";
}

</script>

</body>
</html>
